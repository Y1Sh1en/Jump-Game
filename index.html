<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Jump Jump Game - Charge and jump! Press and hold to charge power, release to jump. Test your precision and aim for the highest score!">
    <title>Jump Jump | Charge Jump Challenge</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        
        #gameContainer {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
            position: relative;
        }
        
        .canvas-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        canvas {
            border-radius: 28px;
            cursor: pointer;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            width: 100%;
            height: auto;
            aspect-ratio: 500 / 400;
        }
        
        canvas:active {
            transform: scale(0.99);
        }
        
        /* CENTER RESTART BUTTON - only appears when game over */
        .center-restart-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            color: #1e2a3e;
            border: none;
            border-radius: 60px;
            padding: 14px 32px;
            font-size: 20px;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,200,0.5);
            transition: all 0.2s ease;
            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            animation: gentlePulse 1.8s infinite;
            display: none;  /* Hidden by default, appears only on game over */
        }
        
        .center-restart-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            background: linear-gradient(135deg, #ffe6b3, #ffaa44);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        .center-restart-btn:active {
            transform: translate(-50%, -50%) scale(0.97);
        }
        
        @keyframes gentlePulse {
            0% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,200,100,0.7); }
            70% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 0 12px rgba(255,200,100,0); }
            100% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,200,100,0); }
        }
        
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .score-box {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 40px;
            min-width: 90px;
        }
        
        .score-label {
            font-size: 12px;
            color: #e0e0e0;
            letter-spacing: 1px;
            font-weight: 500;
        }
        
        .score-value {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            line-height: 1;
        }
        
        .highscore-value {
            color: #ffd966;
            text-shadow: 0 0 8px rgba(255,200,50,0.5);
        }
        
        .charging-bar {
            flex-grow: 1;
            margin: 0 8px;
        }
        
        .charging-text {
            font-size: 11px;
            color: #f0f0f0;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .bar-bg {
            background: rgba(0,0,0,0.4);
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .bar-fill {
            background: linear-gradient(90deg, #ff9966, #ff5e62);
            height: 100%;
            width: 0%;
            transition: width 0.02s linear;
            border-radius: 20px;
            box-shadow: 0 0 6px #ff5e62;
        }
        
        .controls {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.3);
            padding: 10px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        
        /* Floating animations */
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0px) scale(0.7);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.2);
            }
        }
        
        .floating-score {
            position: fixed;
            font-size: 26px;
            font-weight: bold;
            pointer-events: none;
            z-index: 2000;
            filter: drop-shadow(0 0 6px gold);
            animation: floatUp 0.8s ease-out forwards;
        }
        
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-5px); }
            75%{ transform: translateX(5px); }
        }
        
        .game-over-shake {
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 15px gold; }
            100% { transform: scale(1); }
        }
        
        .record-bling {
            animation: bounce 0.4s ease;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            #gameContainer { padding: 15px; }
            .info-panel { padding: 10px 15px; gap: 10px; }
            .score-box { min-width: 70px; padding: 4px 12px; }
            .score-value { font-size: 20px; }
            .score-label { font-size: 10px; }
            .controls { font-size: 10px; padding: 8px 12px; }
            .charging-text { font-size: 9px; }
            .bar-bg { height: 10px; }
            .center-restart-btn { padding: 10px 22px; font-size: 16px; white-space: nowrap; }
        }
        
        @media (max-width: 480px) {
            .score-value { font-size: 18px; }
            .score-box { min-width: 60px; }
            .center-restart-btn { padding: 8px 18px; font-size: 14px; }
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            body { padding: 10px; }
            #gameContainer { padding: 10px; }
            .info-panel { margin-top: 10px; padding: 8px 12px; }
            .center-restart-btn { padding: 6px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="400"></canvas>
            <button id="centerRestartBtn" class="center-restart-btn">🔄 RESTART</button>
        </div>
        
        <div class="info-panel">
            <div class="score-box">
                <div class="score-label">🎯 SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            
            <div class="charging-bar">
                <div class="charging-text" id="chargingText">💡 HOLD to CHARGE</div>
                <div class="bar-bg">
                    <div class="bar-fill" id="chargingBar"></div>
                </div>
            </div>
            
            <div class="score-box">
                <div class="score-label">🏆 BEST</div>
                <div class="score-value highscore-value" id="highScore">0</div>
            </div>
        </div>
        
        <div class="controls">
            💻 PC: Hold SPACE / Mouse to charge → Release to jump &nbsp;&nbsp;|&nbsp;&nbsp; 🔄 SPACE also restarts (anytime)<br>
            📱 Mobile: Long press on screen → Release to jump | Restart button appears after game over
        </div>
    </div>

    <script>
        (function(){
            // Canvas elements
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const centerRestartBtn = document.getElementById('centerRestartBtn');
            
            // Fixed logical dimensions
            const WIDTH = 500;
            const HEIGHT = 400;
            
            // Handle canvas scaling
            function resizeCanvas() {
                const container = canvas.parentElement;
                const maxWidth = container.clientWidth;
                if (maxWidth < 500) {
                    canvas.style.width = '100%';
                    canvas.style.height = 'auto';
                } else {
                    canvas.style.width = '500px';
                    canvas.style.height = '400px';
                }
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Game state
            let player = { x: 250, y: 350, radius: 13 };
            let target = { x: 320, y: 300, size: 28 };
            let score = 0;
            let highScore = parseInt(localStorage.getItem('jumpHighScore_V4')) || 0;
            let gameRunning = true;
            
            // Charging system
            let isCharging = false;
            let currentPower = 0;
            let pressStartTime = 0;
            
            // Combo system
            let combo = 0;
            let lastJumpSuccess = true;
            
            // Jump execution flag
            let jumpExecuting = false;
            
            // Update UI
            document.getElementById('highScore').innerHTML = highScore;
            document.getElementById('score').innerHTML = "0";
            
            // Vibration feedback (mobile only)
            function vibrate(duration = 50) {
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(duration);
                }
            }
            
            // Generate random target platform
            function generateTarget() {
                const minDistance = 58;
                const maxDistance = 195;
                let attempts = 0;
                let newX, newY;
                let valid = false;
                
                while (!valid && attempts < 60) {
                    newX = Math.random() * (WIDTH - 70) + 35;
                    newY = Math.random() * (HEIGHT - 85) + 45;
                    const dx = newX - player.x;
                    const dy = newY - player.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist >= minDistance && dist <= maxDistance + 30 && dist > 28) {
                        valid = true;
                    }
                    attempts++;
                }
                target.x = Math.min(Math.max(newX, 28), WIDTH - 28);
                target.y = Math.min(Math.max(newY, 28), HEIGHT - 28);
                target.size = 28;
            }
            
            // Distance to target
            function getDistance() {
                const dx = target.x - player.x;
                const dy = target.y - player.y;
                return Math.sqrt(dx*dx + dy*dy);
            }
            
            // Floating score animation
            function showFloatingScore(addScore, isPerfect = false) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.clientWidth / WIDTH;
                const scaleY = canvas.clientHeight / HEIGHT;
                const div = document.createElement('div');
                div.className = 'floating-score';
                div.textContent = `+${addScore}`;
                if (isPerfect) div.textContent = `✨ PERFECT +${addScore} ✨`;
                div.style.left = `${rect.left + target.x * scaleX}px`;
                div.style.top = `${rect.top + target.y * scaleY - 20}px`;
                div.style.color = isPerfect ? '#ffd966' : '#ffffff';
                div.style.fontSize = isPerfect ? '26px' : '22px';
                div.style.fontWeight = 'bold';
                div.style.textShadow = '0 0 8px #ff8800';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 800);
            }
            
            // Center screen message
            function showCenterMessage(text, color, isGameOver = false) {
                const msgDiv = document.createElement('div');
                msgDiv.textContent = text;
                msgDiv.style.position = 'fixed';
                msgDiv.style.left = '50%';
                msgDiv.style.top = '40%';
                msgDiv.style.transform = 'translate(-50%, -50%)';
                msgDiv.style.backgroundColor = isGameOver ? 'rgba(0,0,0,0.85)' : 'rgba(0,0,0,0.65)';
                msgDiv.style.backdropFilter = 'blur(12px)';
                msgDiv.style.color = color;
                msgDiv.style.fontSize = '24px';
                msgDiv.style.fontWeight = 'bold';
                msgDiv.style.padding = '14px 28px';
                msgDiv.style.borderRadius = '60px';
                msgDiv.style.border = `2px solid ${color}`;
                msgDiv.style.zIndex = '3000';
                msgDiv.style.pointerEvents = 'none';
                msgDiv.style.whiteSpace = 'nowrap';
                msgDiv.style.fontFamily = 'inherit';
                msgDiv.style.animation = 'fadeOut 0.9s ease-out forwards';
                document.body.appendChild(msgDiv);
                setTimeout(() => msgDiv.remove(), 900);
            }
            
            // Add fadeOut keyframes
            if (!document.querySelector('#fadeStyle')) {
                const style = document.createElement('style');
                style.id = 'fadeStyle';
                style.textContent = `@keyframes fadeOut { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -70%) scale(1.3); } }`;
                document.head.appendChild(style);
            }
            
            // Show restart button (only when game over)
            function showRestartButton() {
                centerRestartBtn.style.display = 'flex';
            }
            
            function hideRestartButton() {
                centerRestartBtn.style.display = 'none';
            }
            
            // Perform jump: core mechanic
            function performJump() {
                if (!gameRunning || !isCharging || jumpExecuting) return;
                jumpExecuting = true;
                
                const distance = getDistance();
                const jumpDistance = Math.min(currentPower * 2.05, 210);
                const error = Math.abs(jumpDistance - distance);
                const isPerfect = error < 12;
                const isHit = error < 30;
                
                if (isHit) {
                    vibrate(30);
                    let addScore = 100 + Math.floor(currentPower / 2.2);
                    if (isPerfect) {
                        addScore = Math.floor(addScore * 1.5);
                        combo = (lastJumpSuccess) ? combo + 1 : 1;
                        addScore += combo * 12;
                        showCenterMessage(`⚡ PERFECT! x${combo} ⚡`, '#ffcc44');
                        vibrate(50);
                    } else {
                        if (lastJumpSuccess) combo++;
                        else combo = 1;
                        addScore += combo * 5;
                        showCenterMessage(`👍 GREAT! +${addScore}`, '#aaffdd');
                    }
                    
                    score += addScore;
                    document.getElementById('score').innerHTML = score;
                    showFloatingScore(addScore, isPerfect);
                    
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('jumpHighScore_V4', highScore);
                        document.getElementById('highScore').innerHTML = highScore;
                        const highEl = document.getElementById('highScore');
                        highEl.classList.add('record-bling');
                        setTimeout(() => highEl.classList.remove('record-bling'), 400);
                        showCenterMessage('🏆 NEW RECORD! 🏆', '#ffaa44');
                        vibrate(100);
                    }
                    
                    // Teleport player to target
                    player.x = target.x;
                    player.y = target.y;
                    generateTarget();
                    lastJumpSuccess = true;
                    
                    if (combo >= 3 && combo % 3 === 0) {
                        showCenterMessage(`🔥 ${combo} COMBO! 🔥`, '#ff8866');
                    }
                    
                } else {
                    // GAME OVER
                    vibrate(100);
                    gameRunning = false;
                    lastJumpSuccess = false;
                    combo = 0;
                    showCenterMessage(`💀 GAME OVER  Score: ${score} 💀`, '#ff6b6b', true);
                    document.getElementById('chargingText').innerHTML = '💀 GAME OVER - Press RESTART';
                    document.getElementById('chargingText').style.color = '#ffaaaa';
                    
                    canvas.classList.add('game-over-shake');
                    setTimeout(() => canvas.classList.remove('game-over-shake'), 400);
                    
                    const distMsg = document.createElement('div');
                    distMsg.textContent = `Missed by ${Math.floor(error)} pixels... Try again!`;
                    distMsg.style.position = 'fixed';
                    distMsg.style.bottom = '25%';
                    distMsg.style.left = '50%';
                    distMsg.style.transform = 'translateX(-50%)';
                    distMsg.style.backgroundColor = '#000000aa';
                    distMsg.style.color = '#ffaa88';
                    distMsg.style.padding = '6px 20px';
                    distMsg.style.borderRadius = '40px';
                    distMsg.style.fontSize = '14px';
                    distMsg.style.zIndex = '2000';
                    distMsg.style.backdropFilter = 'blur(4px)';
                    document.body.appendChild(distMsg);
                    setTimeout(() => distMsg.remove(), 1500);
                    
                    // Show the restart button (game over state)
                    showRestartButton();
                }
                
                // Reset charging state
                isCharging = false;
                currentPower = 0;
                updateChargingDisplay();
                jumpExecuting = false;
            }
            
            // Start charging
            function startCharge(e) {
                e.preventDefault();
                if (!gameRunning) return;
                if (isCharging) return;
                isCharging = true;
                pressStartTime = Date.now();
                currentPower = 0;
                updateChargingDisplay();
                canvas.style.cursor = 'grabbing';
            }
            
            // End charging (jump attempt)
            function endCharge(e) {
                e.preventDefault();
                canvas.style.cursor = 'pointer';
                if (!gameRunning) {
                    if (isCharging) {
                        isCharging = false;
                        currentPower = 0;
                        updateChargingDisplay();
                    }
                    return;
                }
                if (isCharging) {
                    performJump();
                }
            }
            
            // Update charging UI
            function updateChargingDisplay() {
                const fillPercent = currentPower;
                document.getElementById('chargingBar').style.width = fillPercent + '%';
                if (isCharging && gameRunning) {
                    document.getElementById('chargingText').innerHTML = `⚡ CHARGING ${Math.floor(currentPower)}% ⚡`;
                    document.getElementById('chargingText').style.color = '#ffcc88';
                } else if (gameRunning) {
                    document.getElementById('chargingText').innerHTML = '💡 HOLD to CHARGE';
                    document.getElementById('chargingText').style.color = '#f0f0f0';
                }
            }
            
            // Charging loop
            let chargeLoopId = null;
            function startChargeUpdater() {
                if (chargeLoopId) cancelAnimationFrame(chargeLoopId);
                function updateCharge() {
                    if (isCharging && gameRunning) {
                        const now = Date.now();
                        const elapsed = now - pressStartTime;
                        let newPower = Math.min((elapsed / 7.5), 100);
                        if (newPower !== currentPower) {
                            currentPower = newPower;
                            updateChargingDisplay();
                        }
                    }
                    chargeLoopId = requestAnimationFrame(updateCharge);
                }
                updateCharge();
            }
            
            // RESET GAME (full restart)
            function resetGame() {
                gameRunning = true;
                score = 0;
                combo = 0;
                lastJumpSuccess = true;
                isCharging = false;
                currentPower = 0;
                jumpExecuting = false;
                
                player = { x: 250, y: 350, radius: 13 };
                document.getElementById('score').innerHTML = "0";
                updateChargingDisplay();
                document.getElementById('chargingText').innerHTML = '💡 HOLD to CHARGE';
                document.getElementById('chargingText').style.color = '#f0f0f0';
                
                // Generate valid starting target
                generateTarget();
                let firstDist = getDistance();
                if (firstDist < 55 || firstDist > 210) {
                    generateTarget();
                }
                
                // Hide restart button since game is active again
                hideRestartButton();
                canvas.classList.remove('game-over-shake');
                showCenterMessage('✨ GAME RESTARTED! ✨', '#88ffaa');
                vibrate(50);
            }
            
            // Handle restart (called from button or space)
            function handleRestart() {
                resetGame();
            }
            
            // Drawing routines
            function draw() {
                ctx.clearRect(0, 0, WIDTH, HEIGHT);
                
                // Background gradient
                const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
                grad.addColorStop(0, '#eef4ff');
                grad.addColorStop(1, '#d9e6f5');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                
                // subtle grid
                ctx.strokeStyle = '#b7cfdf';
                ctx.lineWidth = 0.6;
                for (let i = 0; i < WIDTH; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, HEIGHT);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(WIDTH, i);
                    ctx.stroke();
                }
                
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 8;
                // Target platform
                ctx.fillStyle = '#ffb347';
                ctx.fillRect(target.x - target.size/2, target.y - target.size/2, target.size, target.size);
                ctx.fillStyle = '#ffdd99';
                ctx.fillRect(target.x - target.size/3, target.y - target.size/3, target.size*0.66, target.size*0.66);
                ctx.fillStyle = '#fff0b5';
                ctx.fillRect(target.x - target.size/5, target.y - target.size/5, target.size*0.4, target.size*0.4);
                
                // Player character
                const gradPlayer = ctx.createRadialGradient(player.x-3, player.y-3, 3, player.x, player.y, player.radius);
                gradPlayer.addColorStop(0, '#6dd5fa');
                gradPlayer.addColorStop(1, '#2b9bc2');
                ctx.fillStyle = gradPlayer;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(player.x - 5, player.y - 4, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(player.x + 5, player.y - 4, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(player.x - 5.2, player.y - 4.8, 1.3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(player.x + 4.8, player.y - 4.8, 1.3, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#ffaa99';
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.ellipse(player.x - 9, player.y + 2, 2.5, 1.8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(player.x + 9, player.y + 2, 2.5, 1.8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                ctx.beginPath();
                ctx.arc(player.x, player.y + 3, 6, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Charging effect
                if (isCharging && gameRunning) {
                    const pulseSize = player.radius + (currentPower / 2.2);
                    ctx.fillStyle = `rgba(255, 120, 80, ${0.25 + currentPower/200})`;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, pulseSize, 0, Math.PI*2);
                    ctx.fill();
                    
                    const angle = Math.atan2(target.y - player.y, target.x - player.x);
                    const lineLen = player.radius + currentPower * 1.7;
                    const toX = player.x + Math.cos(angle) * lineLen;
                    const toY = player.y + Math.sin(angle) * lineLen;
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(toX, toY);
                    ctx.strokeStyle = `#ff8855`;
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 8]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                // Guide line
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(target.x, target.y);
                ctx.strokeStyle = '#aaaaaacc';
                ctx.setLineDash([6, 8]);
                ctx.lineWidth = 1.2;
                ctx.stroke();
                ctx.setLineDash([]);
                
                const dist = getDistance();
                ctx.font = 'bold 13px "Segoe UI"';
                ctx.fillStyle = '#1e466e';
                ctx.shadowBlur = 2;
                ctx.fillText(`📏 ${Math.floor(dist)} px`, (player.x + target.x)/2 - 22, (player.y + target.y)/2 - 12);
                
                if (combo >= 2 && gameRunning) {
                    ctx.font = 'bold 20px "Segoe UI"';
                    ctx.fillStyle = '#ff8844';
                    ctx.shadowBlur = 0;
                    ctx.fillText(`x${combo} COMBO`, player.x - 28, player.y - 20);
                }
                ctx.shadowBlur = 0;
            }
            
            function animate() {
                draw();
                requestAnimationFrame(animate);
            }
            
            // Event binding
            function attachEvents() {
                canvas.addEventListener('mousedown', startCharge);
                window.addEventListener('mouseup', endCharge);
                canvas.addEventListener('touchstart', startCharge, {passive: false});
                canvas.addEventListener('touchend', endCharge, {passive: false});
                canvas.addEventListener('touchcancel', endCharge, {passive: false});
                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                
                // Keyboard: Space for charge & also restart (if game over, restart; if running, charge)
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (!gameRunning) {
                            // If game over, pressing space restarts
                            handleRestart();
                        } else {
                            // Game is running: start charge if not already charging
                            if (!isCharging && gameRunning) {
                                startCharge(e);
                            }
                        }
                    }
                });
                window.addEventListener('keyup', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (gameRunning && isCharging) {
                            endCharge(e);
                        }
                    }
                });
                
                // Center restart button click - only appears when game over
                centerRestartBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleRestart();
                });
                
                canvas.addEventListener('touchmove', (e) => {
                    if (isCharging) e.preventDefault();
                }, {passive: false});
            }
            
            // initialization
            function init() {
                attachEvents();
                startChargeUpdater();
                generateTarget();
                let initDist = getDistance();
                if (initDist < 55 || initDist > 205) generateTarget();
                // Initially button hidden (game active)
                hideRestartButton();
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
