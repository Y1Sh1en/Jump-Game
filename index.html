<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跳一跳 | 蓄力跳跃挑战</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        
        #gameContainer {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        canvas {
            border-radius: 28px;
            cursor: pointer;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        
        canvas:active {
            transform: scale(0.99);
        }
        
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .score-box {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 40px;
            min-width: 90px;
        }
        
        .score-label {
            font-size: 12px;
            color: #e0e0e0;
            letter-spacing: 1px;
            font-weight: 500;
        }
        
        .score-value {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            line-height: 1;
        }
        
        .highscore-value {
            color: #ffd966;
            text-shadow: 0 0 8px rgba(255,200,50,0.5);
        }
        
        .charging-bar {
            flex-grow: 1;
            margin: 0 8px;
        }
        
        .charging-text {
            font-size: 11px;
            color: #f0f0f0;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .bar-bg {
            background: rgba(0,0,0,0.4);
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .bar-fill {
            background: linear-gradient(90deg, #ff9966, #ff5e62);
            height: 100%;
            width: 0%;
            transition: width 0.02s linear;
            border-radius: 20px;
            box-shadow: 0 0 6px #ff5e62;
        }
        
        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            color: #1e2a3e;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .controls {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        
        /* 粒子特效和提示动画 */
        @keyframes popScore {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .floating-score {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            z-index: 2000;
            filter: drop-shadow(0 0 6px gold);
            animation: floatUp 0.8s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0px) scale(0.8);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.2);
            }
        }
        
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-5px); }
            75%{ transform: translateX(5px); }
        }
        
        .game-over-shake {
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 15px gold; }
            100% { transform: scale(1); }
        }
        
        .record-bling {
            animation: bounce 0.4s ease;
        }
        
        @media (max-width: 600px) {
            .info-panel { padding: 8px 16px; }
            .score-value { font-size: 22px; }
            button { padding: 6px 18px; font-size: 13px; }
            .controls { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="400"></canvas>
        
        <div class="info-panel">
            <div class="score-box">
                <div class="score-label">🎯 得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            
            <div class="charging-bar">
                <div class="charging-text" id="chargingText">💡 按住 蓄力跳跃</div>
                <div class="bar-bg">
                    <div class="bar-fill" id="chargingBar"></div>
                </div>
            </div>
            
            <div class="score-box">
                <div class="score-label">🏆 最高分</div>
                <div class="score-value highscore-value" id="highScore">0</div>
            </div>
            
            <button id="resetBtn">🔄 重来</button>
        </div>
        
        <div class="controls">
            🖱️ 鼠标长按 / 按住空格蓄力 → 释放跳跃 | 力度决定距离，精准落点加分！
        </div>
    </div>

    <script>
        (function(){
            // ----- 画布元素 -----
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // ----- 固定尺寸 -----
            const WIDTH = 500;
            const HEIGHT = 400;
            
            // ----- 游戏核心参数（优化版）-----
            let player = { x: 250, y: 350, radius: 13 };
            let target = { x: 320, y: 300, size: 28 };
            let score = 0;
            let highScore = parseInt(localStorage.getItem('jumpHighScore_V2')) || 0;
            let gameRunning = true;
            
            // 蓄力系统
            let isCharging = false;
            let currentPower = 0;      // 0-100
            let pressStartTime = 0;
            
            // 特效与连击
            let combo = 0;              // 连击计数
            let lastJumpSuccess = true;
            
            // 辅助变量 (防止重复跳跃/快速释放)
            let jumpExecuting = false;
            
            // 显示最高分
            document.getElementById('highScore').innerHTML = highScore;
            document.getElementById('score').innerHTML = "0";
            
            // ----- 增强: 智能生成平台，避免太远/太近且不超出边界 -----
            function generateTarget() {
                const minDistance = 65;      // 最小跳跃距离
                const maxDistance = 200;     // 最大理论跳跃距离（游戏蓄力满100跳200）
                let attempts = 0;
                let newX, newY;
                let valid = false;
                
                while (!valid && attempts < 60) {
                    // 留出边距，避免平台太靠边缘
                    newX = Math.random() * (WIDTH - 70) + 35;
                    newY = Math.random() * (HEIGHT - 85) + 45;
                    const dx = newX - player.x;
                    const dy = newY - player.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    // 确保距离在合理区间内 (过远必死没意义，过近太简单)
                    if (dist >= minDistance && dist <= maxDistance + 40) {
                        // 额外避免与玩家重叠
                        if (dist > 25) {
                            valid = true;
                        }
                    }
                    attempts++;
                }
                // 保底生成：确保不超出边界
                target.x = Math.min(Math.max(newX, 28), WIDTH - 28);
                target.y = Math.min(Math.max(newY, 28), HEIGHT - 28);
                
                // 动态调整目标平台视觉效果大小
                target.size = 28;
            }
            
            // 欧式距离
            function getDistance() {
                const dx = target.x - player.x;
                const dy = target.y - player.y;
                return Math.sqrt(dx*dx + dy*dy);
            }
            
            // 飘浮加分特效 (炫酷)
            function showFloatingScore(addScore, isPerfect = false) {
                const div = document.createElement('div');
                div.className = 'floating-score';
                div.textContent = `+${addScore}`;
                if (isPerfect) div.textContent = `✨ PERFECT +${addScore} ✨`;
                div.style.left = `${canvas.getBoundingClientRect().left + target.x}px`;
                div.style.top = `${canvas.getBoundingClientRect().top + target.y - 20}px`;
                div.style.color = isPerfect ? '#ffd966' : '#ffffff';
                div.style.fontSize = isPerfect ? '26px' : '22px';
                div.style.fontWeight = 'bold';
                div.style.textShadow = '0 0 8px #ff8800';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 800);
            }
            
            // 屏幕中央消息特效
            function showCenterMessage(text, color, isGameOver = false) {
                const msgDiv = document.createElement('div');
                msgDiv.textContent = text;
                msgDiv.style.position = 'fixed';
                msgDiv.style.left = '50%';
                msgDiv.style.top = '40%';
                msgDiv.style.transform = 'translate(-50%, -50%)';
                msgDiv.style.backgroundColor = isGameOver ? 'rgba(0,0,0,0.8)' : 'rgba(0,0,0,0.6)';
                msgDiv.style.backdropFilter = 'blur(8px)';
                msgDiv.style.color = color;
                msgDiv.style.fontSize = '28px';
                msgDiv.style.fontWeight = 'bold';
                msgDiv.style.padding = '16px 32px';
                msgDiv.style.borderRadius = '60px';
                msgDiv.style.border = `2px solid ${color}`;
                msgDiv.style.zIndex = '3000';
                msgDiv.style.pointerEvents = 'none';
                msgDiv.style.whiteSpace = 'nowrap';
                msgDiv.style.fontFamily = 'inherit';
                msgDiv.style.animation = 'fadeOut 0.8s ease-out forwards';
                document.body.appendChild(msgDiv);
                setTimeout(() => msgDiv.remove(), 800);
            }
            
            // 执行跳跃 (核心优化)
            function performJump() {
                if (!gameRunning || !isCharging || jumpExecuting) return;
                jumpExecuting = true;
                
                const distance = getDistance();
                // 蓄力值映射为跳跃距离 (最大200)
                const jumpDistance = Math.min(currentPower * 2, 210);
                const error = Math.abs(jumpDistance - distance);
                
                // 优化判定: 完美范围 12，良好范围 25
                const isPerfect = error < 12;
                const isHit = error < 28;
                
                if (isHit) {
                    // ----- 跳跃成功逻辑 -----
                    let addScore = 100 + Math.floor(currentPower / 2.5);  // 100~140之间动态
                    if (isPerfect) {
                        addScore = Math.floor(addScore * 1.5);
                        // 连击加成
                        combo = (lastJumpSuccess) ? combo + 1 : 1;
                        addScore += combo * 12;
                        showCenterMessage(`⚡ PERFECT! x${combo} ⚡`, '#ffcc44');
                        // 特效粒子感
                    } else {
                        if (lastJumpSuccess) combo++;
                        else combo = 1;
                        addScore += combo * 5;
                        showCenterMessage(`👍 漂亮 +${addScore}`, '#aaffdd');
                    }
                    
                    // 更新分数
                    score += addScore;
                    document.getElementById('score').innerHTML = score;
                    
                    // 飘浮加分效果
                    showFloatingScore(addScore, isPerfect);
                    
                    // 最高分更新与动画
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('jumpHighScore_V2', highScore);
                        document.getElementById('highScore').innerHTML = highScore;
                        const highEl = document.getElementById('highScore');
                        highEl.classList.add('record-bling');
                        setTimeout(() => highEl.classList.remove('record-bling'), 400);
                        showCenterMessage('🏆 新纪录！ 🏆', '#ffaa44');
                    }
                    
                    // 移动玩家到目标点中心 (吸附)
                    player.x = target.x;
                    player.y = target.y;
                    
                    // 生成下一个平台
                    generateTarget();
                    
                    lastJumpSuccess = true;
                    
                    // 小优化: 连击音效模拟（视觉反馈）
                    if (combo >= 3 && combo % 3 === 0) {
                        showCenterMessage(`🔥 ${combo} 连击！ 🔥`, '#ff8866');
                    }
                    
                } else {
                    // ----- 游戏结束 -----
                    gameRunning = false;
                    lastJumpSuccess = false;
                    combo = 0;
                    showCenterMessage(`💀 游戏结束  得分: ${score} 💀`, '#ff6b6b', true);
                    document.getElementById('chargingText').innerHTML = '💀 游戏结束，点击「重来」继续挑战';
                    document.getElementById('chargingText').style.color = '#ffaaaa';
                    
                    // 添加画布抖动效果 (通过类)
                    canvas.classList.add('game-over-shake');
                    setTimeout(() => canvas.classList.remove('game-over-shake'), 400);
                    
                    // 额外显示失败距离提示
                    const distMsg = document.createElement('div');
                    distMsg.textContent = `差了 ${Math.floor(error)} 像素... 继续加油！`;
                    distMsg.style.position = 'fixed';
                    distMsg.style.bottom = '25%';
                    distMsg.style.left = '50%';
                    distMsg.style.transform = 'translateX(-50%)';
                    distMsg.style.backgroundColor = '#000000aa';
                    distMsg.style.color = '#ffaa88';
                    distMsg.style.padding = '6px 20px';
                    distMsg.style.borderRadius = '40px';
                    distMsg.style.fontSize = '14px';
                    distMsg.style.zIndex = '2000';
                    distMsg.style.backdropFilter = 'blur(4px)';
                    document.body.appendChild(distMsg);
                    setTimeout(() => distMsg.remove(), 1500);
                }
                
                // 重置蓄力状态
                isCharging = false;
                currentPower = 0;
                updateChargingDisplay();
                jumpExecuting = false;
            }
            
            // 开始蓄力
            function startCharge(e) {
                e.preventDefault();
                if (!gameRunning) return;
                if (isCharging) return;
                isCharging = true;
                pressStartTime = Date.now();
                currentPower = 0;
                updateChargingDisplay();
                // 蓄力时轻微画布提示
                canvas.style.cursor = 'grabbing';
            }
            
            // 结束蓄力
            function endCharge(e) {
                e.preventDefault();
                canvas.style.cursor = 'pointer';
                if (!gameRunning) {
                    // 如果游戏结束中但还在蓄力状态，强制清理
                    if (isCharging) {
                        isCharging = false;
                        currentPower = 0;
                        updateChargingDisplay();
                    }
                    return;
                }
                if (isCharging) {
                    performJump();
                }
            }
            
            // 更新UI (蓄力条)
            function updateChargingDisplay() {
                const fillPercent = currentPower;
                document.getElementById('chargingBar').style.width = fillPercent + '%';
                if (isCharging && gameRunning) {
                    document.getElementById('chargingText').innerHTML = `⚡ 蓄力中 ${Math.floor(currentPower)}%  ⚡`;
                    document.getElementById('chargingText').style.color = '#ffcc88';
                } else if (gameRunning) {
                    document.getElementById('chargingText').innerHTML = '💡 按住 蓄力跳跃';
                    document.getElementById('chargingText').style.color = '#f0f0f0';
                }
            }
            
            // 蓄力实时更新循环 (性能优化 requestFrame)
            let chargeLoopId = null;
            function startChargeUpdater() {
                if (chargeLoopId) cancelAnimationFrame(chargeLoopId);
                function updateCharge() {
                    if (isCharging && gameRunning) {
                        const now = Date.now();
                        const elapsed = now - pressStartTime;
                        // 蓄力速度: 0.7秒蓄满 (更跟手)
                        let newPower = Math.min((elapsed / 7.5), 100);
                        if (newPower !== currentPower) {
                            currentPower = newPower;
                            updateChargingDisplay();
                        }
                    }
                    chargeLoopId = requestAnimationFrame(updateCharge);
                }
                updateCharge();
            }
            
            // 重置游戏 (优化版)
            function resetGame() {
                gameRunning = true;
                score = 0;
                combo = 0;
                lastJumpSuccess = true;
                isCharging = false;
                currentPower = 0;
                jumpExecuting = false;
                
                // 玩家起始位置 (安全区)
                player = { x: 250, y: 350, radius: 13 };
                document.getElementById('score').innerHTML = "0";
                updateChargingDisplay();
                document.getElementById('chargingText').innerHTML = '💡 按住 蓄力跳跃';
                document.getElementById('chargingText').style.color = '#f0f0f0';
                
                // 生成有效目标
                generateTarget();
                
                // 强制让第一个目标不要过于离谱
                let firstDist = getDistance();
                if (firstDist < 50 || firstDist > 210) {
                    generateTarget();
                }
                
                showCenterMessage('✨ 游戏已重置，挑战开始 ✨', '#88ffaa');
                canvas.classList.remove('game-over-shake');
            }
            
            // ---------- 绘制模块（华丽视觉优化）----------
            function draw() {
                ctx.clearRect(0, 0, WIDTH, HEIGHT);
                
                // 渐变背景
                const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
                grad.addColorStop(0, '#e9f0ff');
                grad.addColorStop(1, '#d4e0f0');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                
                // 装饰网格+光晕
                ctx.strokeStyle = '#b0c4de';
                ctx.lineWidth = 0.5;
                for (let i = 0; i < WIDTH; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, HEIGHT);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(WIDTH, i);
                    ctx.stroke();
                }
                
                // 目标平台阴影
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 12;
                // 平台立体感
                ctx.fillStyle = '#ff8c69';
                ctx.fillRect(target.x - target.size/2, target.y - target.size/2, target.size, target.size);
                ctx.fillStyle = '#ffaa77';
                ctx.fillRect(target.x - target.size/3, target.y - target.size/3, target.size*0.66, target.size*0.66);
                // 平台高光
                ctx.fillStyle = '#ffdd99';
                ctx.fillRect(target.x - target.size/5, target.y - target.size/5, target.size*0.4, target.size*0.4);
                
                // 玩家圆形+渐变
                const gradPlayer = ctx.createRadialGradient(player.x-3, player.y-3, 3, player.x, player.y, player.radius);
                gradPlayer.addColorStop(0, '#6dd5fa');
                gradPlayer.addColorStop(1, '#2b9bc2');
                ctx.fillStyle = gradPlayer;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(player.x - 5, player.y - 4, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(player.x + 5, player.y - 4, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(player.x - 5.2, player.y - 4.8, 1.3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(player.x + 4.8, player.y - 4.8, 1.3, 0, Math.PI*2);
                ctx.fill();
                // 腮红
                ctx.fillStyle = '#ffaa99';
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.ellipse(player.x - 9, player.y + 2, 2.5, 1.8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(player.x + 9, player.y + 2, 2.5, 1.8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                // 微笑
                ctx.beginPath();
                ctx.arc(player.x, player.y + 3, 6, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 蓄力特效: 动态光圈+指引线
                if (isCharging && gameRunning) {
                    const pulseSize = player.radius + (currentPower / 2.2);
                    ctx.fillStyle = `rgba(255, 120, 80, ${0.25 + currentPower/200})`;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, pulseSize, 0, Math.PI*2);
                    ctx.fill();
                    
                    // 动态虚线轨迹 (方向指向目标)
                    const angle = Math.atan2(target.y - player.y, target.x - player.x);
                    const lineLen = player.radius + currentPower * 1.8;
                    const toX = player.x + Math.cos(angle) * lineLen;
                    const toY = player.y + Math.sin(angle) * lineLen;
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(toX, toY);
                    ctx.strokeStyle = `#ff8855`;
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 8]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                // 虚线距离指示 (优雅)
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(target.x, target.y);
                ctx.strokeStyle = '#888888aa';
                ctx.setLineDash([7, 7]);
                ctx.lineWidth = 1.2;
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 距离数值标签
                const dist = getDistance();
                ctx.font = 'bold 14px "Segoe UI"';
                ctx.fillStyle = '#2c3e66';
                ctx.shadowBlur = 2;
                ctx.fillText(`📏 ${Math.floor(dist)} px`, (player.x + target.x)/2 - 20, (player.y + target.y)/2 - 12);
                
                // 连击显示
                if (combo >= 2 && gameRunning) {
                    ctx.font = 'bold 22px "Segoe UI"';
                    ctx.fillStyle = '#ff8844';
                    ctx.shadowBlur = 0;
                    ctx.fillText(`x${combo} COMBO`, player.x - 25, player.y - 20);
                }
                
                ctx.shadowBlur = 0;
            }
            
            // ----- 动画循环 (流畅绘制) -----
            function animate() {
                draw();
                requestAnimationFrame(animate);
            }
            
            // ----- 事件绑定（支持触屏和鼠标、键盘优化）-----
            function attachEvents() {
                // 鼠标/触摸
                canvas.addEventListener('mousedown', startCharge);
                window.addEventListener('mouseup', endCharge);
                canvas.addEventListener('touchstart', startCharge, {passive: false});
                window.addEventListener('touchend', endCharge, {passive: false});
                // 防止canvas外释放无效
                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                
                // 键盘空格
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (!gameRunning) return;
                        startCharge(e);
                    }
                });
                window.addEventListener('keyup', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        endCharge(e);
                    }
                });
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    resetGame();
                });
            }
            
            // 初始化游戏
            function init() {
                attachEvents();
                startChargeUpdater();
                generateTarget();
                // 确保起始目标距离合理
                let initDist = getDistance();
                if (initDist < 55 || initDist > 205) {
                    generateTarget();
                }
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
